<style>
:root{--lacivert:#0B2239;--derin:#081A2C;--panel:#102E4A;--kart:#123350;--deniz:#2E86AB;--acik:#7FC8E8;--kum:#F2E9DC;--altin:#E8C67A}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,'Times New Roman',serif;background:var(--lacivert);color:var(--kum);min-height:100vh}
.dalga{background:var(--derin);text-align:center;padding:34px 16px 26px;border-bottom:1px solid #1E4A6E}
.dalga .balik{font-size:40px}
.dalga h1{font-size:34px;letter-spacing:10px;margin-top:6px}
.dalga .alt{font-family:system-ui,sans-serif;font-size:12px;color:var(--acik);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
main{max-width:640px;margin:0 auto;padding:16px 14px 60px}
.kat{border:1px solid #1E4A6E;border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--kart)}
.kat-bas{width:100%;display:flex;justify-content:space-between;align-items:center;padding:17px 18px;background:transparent;border:none;color:var(--kum);font-family:Georgia,serif;font-size:19px;letter-spacing:1px;cursor:pointer}
.kat-bas .ok{color:var(--acik);font-size:14px;transition:transform .25s;font-family:system-ui}
.kat.acik .kat-bas .ok{transform:rotate(180deg)}
.kat-ic{display:none;padding:0 18px 14px}
.kat.acik .kat-ic{display:block}
.urun{display:flex;align-items:baseline;gap:8px;padding:9px 0;border-bottom:1px dotted #23507A}
.urun:last-child{border-bottom:none}
.urun .ad{font-size:16px}
.urun .cizgi{flex:1;border-bottom:1px dotted #2E5F86;transform:translateY(-4px)}
.urun .fiyat{font-family:system-ui,sans-serif;font-size:15px;font-weight:600;color:var(--altin);white-space:nowrap}
.aciklama{font-family:system-ui,sans-serif;font-size:12.5px;color:var(--acik);padding:0 0 8px;margin-top:-4px;line-height:1.5;border-bottom:1px dotted #23507A}
.aciklama.son{border-bottom:none}
.boy-liste{font-family:system-ui,sans-serif;font-size:13.5px;color:var(--kum);padding:2px 0 8px;margin-top:-4px;border-bottom:1px dotted #23507A;display:flex;flex-wrap:wrap;gap:6px 16px}
.boy-liste.son{border-bottom:none}
.boy-liste span b{color:var(--altin);font-weight:600}
.dil-btn{font-family:system-ui,sans-serif;background:transparent;border:1px solid var(--deniz);color:var(--acik);padding:7px 16px;border-radius:16px;font-size:13px;font-weight:700;cursor:pointer}
.dil-btn.aktif{background:var(--deniz);color:#fff}
.u-foto{width:52px;height:52px;object-fit:cover;border-radius:10px;flex-shrink:0}
footer{text-align:center;font-family:system-ui,sans-serif;font-size:11px;color:#4A7396;padding:20px}
</style>
</head>
<body>
<div class="dalga">
  <div class="balik">🐟</div>
  <h1>ŞADİ</h1>
  <div class="alt">Balık Restoranı · Menü</div>
  <div style="margin-top:12px;display:flex;gap:6px;justify-content:center">
    <button class="dil-btn aktif" data-d="tr" onclick="dilSec('tr')">TR</button>

function ciz(){
  const MENU=VERIM;
  const kap=document.getElementById('liste'); kap.innerHTML='';
  MENU.kategoriler.forEach((k,idx)=>{
    const urunler=MENU.urunler.filter(u=>u.kat===k.id);
    if(!urunler.length)return;
    const kat=document.createElement('div');
    kat.className='kat'+(idx===0?' acik':'');
    let ic='';
    urunler.forEach((u,i)=>{
      const son=i===urunler.length-1;
      let fiyatHtml='';
      if(u.tip==='gram'){
        fiyatHtml=u.kgFiyat>0?tl(u.kgFiyat)+' /kg':UI[DIL.aktif].gunluk;
      } else if((u.boylar||[]).length){
        fiyatHtml='';
      } else {
        fiyatHtml=u.fiyat>0?tl(u.fiyat):'—';
      }
      ic+='<div class="urun"><img class="u-foto" loading="lazy" src="foto/'+u.id+'.jpg" onerror="this.remove()"><span class="ad">'+cevir(u)+'</span><span class="cizgi"></span>'+
          '<span class="fiyat">'+fiyatHtml+'</span></div>';
      if((u.boylar||[]).length){
        ic+='<div class="boy-liste'+(son?' son':'')+'">'+
          u.boylar.map(b=>'<span>'+boyCevir(b.ad)+' <b>'+(b.fiyat>0?tl(b.fiyat):'—')+'</b></span>').join('')+'</div>';
      }
      let acikMetin=u.aciklama||(u.icerikler?u.icerikler.join(', '):null);
      const ekler=[];for(const g of(u.secGruplari||[]))if(g.ekFiyatlar)for(const[op,ek]of Object.entries(g.ekFiyatlar))ekler.push(op+' +'+ek);
      if(ekler.length)acikMetin=(acikMetin?acikMetin+' · ':'')+ekler.join(' · ');
      if(acikMetin&&DIL.aktif==='tr')ic+='<div class="aciklama'+(son&&!(u.boylar||[]).length?' son':'')+'">'+acikMetin+'</div>';
    });
    kat.innerHTML='<button class="kat-bas">'+katCevir(k)+'<span class="ok">▼</span></button><div class="kat-ic">'+ic+'</div>';
    kat.querySelector('.kat-bas').onclick=()=>kat.classList.toggle('acik');
    kap.appendChild(kat);
  });
}
